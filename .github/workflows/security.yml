name: Security

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # 依赖审计：检查 Python 依赖的已知漏洞
  dependency_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装审计工具
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e kb
      - name: 运行 pip-audit
        run: |
          pip-audit

  # 容器安全扫描：使用 Trivy 扫描 Docker 镜像
  container_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 构建扫描镜像
        run: |
          docker build -t local-scan:${{ github.sha }} .
      - name: Trivy 安全扫描
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local-scan:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
