name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ================================
  # Basic Checks
  # ================================
  checks:
    name: Basic checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Frontend build (Docusaurus)
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Backend install + import check
        run: |
          cd kb
          uv sync --frozen
          uv run python -m compileall kb

  # ================================
  # Deploy: build & run on server
  # ================================
  deploy:
    name: Deploy to Internal Server
    runs-on: ubuntu-latest
    needs: checks
    environment: production
    steps:
      - name: Deploy (SSH via jump host)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GIT_REPO: https://github.com/${{ github.repository }}.git
          GIT_REF: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.INTERNAL_SSH_HOST }}
          username: ${{ secrets.INTERNAL_SSH_USER }}
          port: ${{ secrets.INTERNAL_SSH_PORT }}
          proxy_host: ${{ secrets.DEPLOY_SSH_HOST }}
          proxy_username: ${{ secrets.DEPLOY_SSH_USER }}
          proxy_port: ${{ secrets.DEPLOY_SSH_PORT }}
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DOPPLER_TOKEN,GIT_REPO,GIT_REF,GIT_SHA
          script: |
            set -euo pipefail

            echo "=== Deploying KB API (local build) ==="
            echo "Host: $(hostname)"

            DEPLOY_DIR="$HOME/.kb-api"
            REPO_DIR="$HOME/.kb-api/repo"
            mkdir -p "$DEPLOY_DIR"

            # ── 1. Clone or update repo ──
            if [ -d "$REPO_DIR/.git" ]; then
              echo "Updating existing repo..."
              cd "$REPO_DIR"
              git fetch --all
              git checkout "$GIT_REF"
              git reset --hard "origin/$GIT_REF"
            else
              echo "Cloning repo..."
              git clone "$GIT_REPO" "$REPO_DIR"
              cd "$REPO_DIR"
              git checkout "$GIT_REF"
            fi

            echo "Checked out: $(git log --oneline -1)"

            # ── 2. Generate cleaned docs JSONL ──
            echo "Generating docs.jsonl..."
            cd "$REPO_DIR"
            npm ci --prefix kb/tools/mdx-clean 2>/dev/null || npm install --prefix kb/tools/mdx-clean
            mkdir -p kb/data/cleaned
            node kb/tools/mdx-clean/bin/clean.mjs \
              --roots docs \
              --output kb/data/cleaned/docs.jsonl
            test -s kb/data/cleaned/docs.jsonl
            echo "docs.jsonl generated ($(wc -l < kb/data/cleaned/docs.jsonl) lines)"

            # ── 3. Write docker-compose.yml + env file ──
            cp "$REPO_DIR/docker-compose.yml" "$DEPLOY_DIR/docker-compose.yml"

            # Install Doppler CLI if missing
            if ! command -v doppler >/dev/null 2>&1; then
              echo "Installing Doppler CLI..."
              curl -Ls --tlsv1.2 --proto "=https" -o /tmp/install-doppler.sh https://cli.doppler.com/install.sh
              sh /tmp/install-doppler.sh
              export PATH="/usr/local/bin:$PATH"
            fi

            umask 077
            echo "Downloading secrets from Doppler..."
            doppler secrets download \
              --format env \
              --no-file \
              --token "$DOPPLER_TOKEN" > "$DEPLOY_DIR/.env.doppler"

            sed 's/^\([^=]*\)= "\(.*\)"$/\1=\2/g' "$DEPLOY_DIR/.env.doppler" > "$DEPLOY_DIR/.env.doppler.clean"

            {
              cat "$DEPLOY_DIR/.env.doppler.clean"
              echo "BUILD_CONTEXT=$REPO_DIR"
            } > "$DEPLOY_DIR/.env"

            # ── 4. Build & deploy with docker compose ──
            cd "$DEPLOY_DIR"
            echo "Building Docker image..."
            docker compose --env-file .env build kb-api

            echo "Running pipeline (stage build)..."
            docker compose --env-file .env run --rm kb-api kb-build --stage build

            echo "Starting service..."
            docker compose --env-file .env up -d kb-api

            # ── 5. Health check ──
            echo "Waiting for /ready..."
            for i in $(seq 1 24); do
              if curl -fSs http://localhost:8000/ready >/dev/null; then
                break
              fi
              sleep 5
            done
            curl -fSs http://localhost:8000/ready >/dev/null

            echo "Deployment OK"
            docker ps --filter "name=kb-api" || true
